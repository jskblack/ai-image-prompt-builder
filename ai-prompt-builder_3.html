<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI 風格詞典</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--white:#ffffff;--surface:#e8edf3;--border:#d0d8e4;
  --text:#1a2332;--text-dim:#5a6a7e;--text-faint:#9aaabb;
  --nav-bg:#1e3a5f;--nav-active:#2d6bbf;--nav-text:#cce0ff;
  --nav-w:84px;--header-h:50px;
}
html,body{height:100%;overflow:hidden;background:var(--nav-bg);
  font-family:'Noto Sans TC',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDENAV ── */
.sidenav{
  width:var(--nav-w);background:var(--nav-bg);
  display:flex;flex-direction:column;align-items:center;
  padding:8px 0 84px;gap:2px;overflow-y:auto;overflow-x:hidden;
  flex-shrink:0;scrollbar-width:none;z-index:10
}
.sidenav::-webkit-scrollbar{display:none}
.nav-logo{
  width:100%;text-align:center;padding:4px 4px 10px;
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  color:rgba(255,255,255,0.25);letter-spacing:0.06em;
  border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:4px;line-height:1.5
}
.nav-btn{
  width:70px;padding:7px 3px;border:none;border-radius:10px;
  background:transparent;color:var(--nav-text);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:all 0.18s;position:relative;opacity:0.6;flex-shrink:0
}
.nav-btn .ni{
  width:34px;height:34px;border-radius:9px;display:flex;
  align-items:center;justify-content:center;font-size:17px;
  background:rgba(255,255,255,0.07);transition:all 0.18s
}
.nav-btn .nl{font-size:10px;font-weight:500;text-align:center;line-height:1.3;white-space:pre-line}
.nav-btn .nb{
  position:absolute;top:3px;right:5px;background:#ff4757;color:#fff;
  font-size:9px;font-weight:700;min-width:15px;height:15px;border-radius:8px;
  display:none;align-items:center;justify-content:center;padding:0 3px
}
.nav-btn .nb.show{display:flex}
.nav-btn:hover{opacity:0.85}
.nav-btn.active{opacity:1;background:rgba(255,255,255,0.1)}
.nav-btn.active .ni{box-shadow:0 3px 10px rgba(0,0,0,0.3)}

/* fixed prompt btn */
.nav-prompt{
  position:fixed;bottom:10px;left:7px;width:70px;padding:9px 4px;
  border:2px solid rgba(255,255,255,0.18);border-radius:12px;
  background:rgba(45,107,191,0.35);color:#fff;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:all 0.18s;z-index:20
}
.nav-prompt .ni{font-size:19px}
.nav-prompt .nl{font-size:9px;font-weight:700;text-align:center;line-height:1.3}
.nav-prompt .sc{
  background:#ff4757;color:#fff;font-size:10px;font-weight:700;
  padding:1px 6px;border-radius:8px;display:none
}
.nav-prompt .sc.show{display:block}
.nav-prompt:hover{background:rgba(45,107,191,0.6);border-color:rgba(255,255,255,0.35)}

/* ── MAIN ── */
.main{
  flex:1;display:flex;flex-direction:column;background:var(--bg);
  overflow:hidden;border-radius:16px 0 0 16px
}

/* cat header */
.cat-hdr{
  height:var(--header-h);background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:9px;flex-shrink:0
}
.cat-bar{width:4px;height:22px;border-radius:3px;flex-shrink:0}
.cat-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.2}
.cat-sub{font-size:10px;color:var(--text-faint)}
.cat-info{
  margin-left:auto;font-size:11px;color:var(--text-dim);
  background:var(--surface);padding:2px 8px;border-radius:10px;white-space:nowrap
}
.cat-info strong{color:var(--nav-active)}

/* group tabs */
.gtabs{
  display:flex;gap:5px;padding:7px 10px;background:var(--white);
  border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none
}
.gtabs::-webkit-scrollbar{display:none}
.gtab{
  padding:4px 11px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg);font-size:11px;font-weight:500;color:var(--text-dim);
  cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0
}
.gtab.active{background:var(--nav-active);border-color:var(--nav-active);color:#fff}

/* search */
.sbar{
  display:flex;align-items:center;gap:7px;padding:7px 10px;
  background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0
}
.sbar input{
  flex:1;border:1px solid var(--border);border-radius:18px;padding:5px 13px;
  font-size:12px;font-family:'Noto Sans TC',sans-serif;background:var(--bg);
  color:var(--text);outline:none
}
.sbar input:focus{border-color:var(--nav-active)}
.sbar input::placeholder{color:var(--text-faint)}
.btn-rnd{
  padding:5px 11px;border-radius:18px;border:1px solid var(--border);
  background:var(--bg);font-size:11px;color:var(--text-dim);cursor:pointer;
  white-space:nowrap;transition:all 0.15s;flex-shrink:0
}
.btn-rnd:hover{border-color:var(--nav-active);color:var(--nav-active)}

/* card grid */
.grid{
  flex:1;overflow-y:auto;padding:8px 8px 80px;
  display:grid;grid-template-columns:1fr 1fr;gap:7px;align-content:start;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent
}
.grid::-webkit-scrollbar{width:3px}
.grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* style card */
.card{
  border-radius:11px;overflow:hidden;background:var(--white);
  border:2px solid transparent;cursor:pointer;transition:all 0.18s;
  position:relative;box-shadow:0 1px 4px rgba(0,0,0,0.07)
}
.card:active{transform:scale(0.97)}
.card.sel{border-color:var(--c-active,var(--nav-active));box-shadow:0 0 0 2px rgba(45,107,191,0.12),0 2px 8px rgba(0,0,0,0.1)}
.card.sel::after{
  content:'✓';position:absolute;top:5px;right:5px;
  width:19px;height:19px;border-radius:50%;
  background:var(--c-active,var(--nav-active));color:#fff;
  font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:2
}
.card-img{width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--surface);position:relative}
.card-img img{
  width:100%;height:100%;object-fit:cover;display:block;
  opacity:0;transition:opacity 0.35s,transform 0.3s
}
.card-img img.ok{opacity:1}
.card:hover .card-img img{transform:scale(1.04)}
.card-ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:26px;opacity:0.35;
  background:linear-gradient(135deg,var(--surface) 0%,var(--border) 100%)
}
.card-body{padding:7px 8px 8px}
.card-en{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;
  color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.card-zh{
  font-size:10px;color:var(--text-dim);margin-top:2px;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
}
.empty-res{
  grid-column:1/-1;text-align:center;padding:48px 20px;color:var(--text-faint)
}
.empty-res .ei{font-size:38px;margin-bottom:10px}
.empty-res p{font-size:12px}

/* ── SHEET ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;
  opacity:0;pointer-events:none;transition:opacity 0.25s
}
.overlay.show{opacity:1;pointer-events:all}
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:101;background:var(--white);
  border-radius:20px 20px 0 0;max-height:92vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  box-shadow:0 -8px 40px rgba(0,0,0,0.2)
}
.sheet.open{transform:translateY(0)}
.sh-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:9px auto 0;flex-shrink:0}
.sh-hdr{padding:11px 16px 9px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.sh-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.sh-sub{font-size:11px;color:var(--text-faint);margin-top:2px}
.sh-close{
  position:absolute;top:10px;right:14px;width:26px;height:26px;border:none;
  background:var(--surface);border-radius:50%;font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--text-dim)
}
.sh-body{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:7px}
.sh-empty{text-align:center;padding:36px 20px;color:var(--text-faint)}
.sh-empty .ei{font-size:34px;margin-bottom:8px}
.sh-empty p{font-size:12px;line-height:1.6}
.sel-item{
  display:flex;align-items:center;gap:7px;padding:7px 9px;
  background:var(--bg);border-radius:9px;border:1px solid var(--border);
  animation:fadeUp 0.15s ease
}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sel-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sel-en{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sel-zh{font-size:10px;color:var(--text-dim);flex-shrink:0;max-width:72px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sel-rm{background:none;border:none;color:var(--text-faint);font-size:14px;cursor:pointer;padding:0 2px;transition:color 0.1s;flex-shrink:0}
.sel-rm:hover{color:#ff4757}

/* prompt box */
.sh-prompt{flex-shrink:0;padding:10px 14px;border-top:1px solid var(--border)}
.pt-label{font-size:9.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-faint);margin-bottom:5px}
.pt-box{
  background:#1a2332;border-radius:9px;padding:9px 11px;
  font-family:'JetBrains Mono',monospace;font-size:11px;color:#7ec8ff;
  line-height:1.7;word-break:break-all;min-height:44px;max-height:76px;overflow-y:auto
}
.pt-box:empty::before{content:'尚未選擇任何詞彙...';color:#3a4a5e;font-style:italic}

/* sheet actions */
.sh-actions{flex-shrink:0;display:flex;gap:7px;padding:9px 14px 18px}
.btn-copy{
  flex:1;padding:12px;background:var(--nav-active);border:none;border-radius:11px;
  color:#fff;font-size:13px;font-weight:700;font-family:'Noto Sans TC',sans-serif;
  cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:5px
}
.btn-copy:hover{background:#1a5aa8}
.btn-copy.copied{background:#2ea86a}
.btn-clr{
  padding:12px 14px;background:var(--bg);border:1px solid var(--border);
  border-radius:11px;color:var(--text-dim);font-size:12px;font-weight:600;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all 0.15s
}
.btn-clr:hover{border-color:#ff4757;color:#ff4757}

/* favs */
.sh-fav{flex-shrink:0;padding:0 14px 6px;border-top:1px solid var(--border)}
.fav-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 0 5px}
.fav-t{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-faint)}
.btn-fsave{
  font-size:10.5px;padding:3px 9px;border:1px solid var(--border);border-radius:7px;
  background:none;color:var(--text-dim);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.15s
}
.btn-fsave:hover{border-color:var(--nav-active);color:var(--nav-active)}
.fav-list{display:flex;flex-direction:column;gap:3px;max-height:76px;overflow-y:auto}
.fav-row{display:flex;align-items:center;gap:5px;padding:4px 7px;border-radius:7px;cursor:pointer;transition:background 0.1s}
.fav-row:hover{background:var(--surface)}
.fav-rn{flex:1;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-rd{background:none;border:none;color:var(--text-faint);font-size:12px;cursor:pointer;padding:0 2px}
.fav-rd:hover{color:#ff4757}
.fav-em{font-size:10.5px;color:var(--text-faint);padding:4px 7px}

/* toast */
.toast{
  position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(8px);
  background:#1a2332;color:#fff;padding:8px 16px;border-radius:18px;
  font-size:12px;opacity:0;transition:all 0.2s;pointer-events:none;z-index:200;
  white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.3)
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div class="app">
  <nav class="sidenav" id="sidenav">
    <div class="nav-logo">AI<br>風格<br>詞典</div>
  </nav>

  <main class="main">
    <div class="cat-hdr">
      <div class="cat-bar" id="catBar"></div>
      <div>
        <div class="cat-title" id="catTitle">—</div>
        <div class="cat-sub" id="catSub">—</div>
      </div>
      <div class="cat-info" id="catInfo">已選 <strong>0</strong></div>
    </div>
    <div class="gtabs" id="gtabs"></div>
    <div class="sbar">
      <input type="text" id="searchInput" placeholder="搜尋詞彙（中文或英文）...">
      <button class="btn-rnd" onclick="addRandom()">🎲 隨機</button>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<button class="nav-prompt" onclick="openSheet()">
  <div class="ni">📋</div>
  <div class="nl">詞彙指令<br>產生器</div>
  <div class="sc" id="navCnt"></div>
</button>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sh-handle"></div>
  <div class="sh-hdr">
    <div class="sh-title">📋 詞彙指令產生器</div>
    <div class="sh-sub" id="shSub">尚未選擇詞彙</div>
    <button class="sh-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sh-body" id="shBody">
    <div class="sh-empty" id="shEmpty">
      <div class="ei">✦</div>
      <p>點選左側風格卡片<br>加入你的 Prompt 組合</p>
    </div>
  </div>
  <div class="sh-prompt">
    <div class="pt-label">Prompt 預覽</div>
    <div class="pt-box" id="ptBox"></div>
  </div>
  <div class="sh-actions">
    <button class="btn-copy" id="copyBtn" onclick="copyPrompt()">📋 複製 Prompt</button>
    <button class="btn-clr" onclick="clearAll()">清除</button>
  </div>
  <div class="sh-fav">
    <div class="fav-hdr">
      <div class="fav-t">收藏組合</div>
      <button class="btn-fsave" onclick="saveFav()">＋ 儲存</button>
    </div>
    <div class="fav-list" id="favList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ─── IMAGE SEED MAP ──────────────────────────
const SEED = {};
let si = 10;
CATS.forEach(cat => {
  cat.groups.forEach(g => {
    g.t.forEach(tag => { SEED[tag.e] = si; si += 11; });
  });
});

function imgUrl(en) {
  return `https://picsum.photos/seed/${SEED[en]||100}/400/300`;
}

// ─── STATE ───────────────────────────────────
let activeCat = CATS[0].id;
let activeGrp = 0;   // -1 = all
let selected = [];   // {e, z, catId, color}
let favs = JSON.parse(localStorage.getItem('aipb3_favs')||'[]');
let q = '';

// ─── NAV ─────────────────────────────────────
function renderNav() {
  const nav = document.getElementById('sidenav');
  const logo = nav.querySelector('.nav-logo');
  nav.innerHTML = '';
  nav.appendChild(logo);
  CATS.forEach(cat => {
    const cnt = selected.filter(s => s.catId === cat.id).length;
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (cat.id === activeCat ? ' active' : '');
    btn.innerHTML = `
      <div class="ni" style="${cat.id===activeCat?`background:${cat.color};box-shadow:0 3px 10px ${cat.color}55`:''}">${cat.icon}</div>
      <div class="nl">${cat.name}</div>
      <div class="nb ${cnt>0?'show':''}">${cnt}</div>`;
    btn.onclick = () => switchCat(cat.id);
    nav.appendChild(btn);
  });
}

function switchCat(id) {
  activeCat = id; activeGrp = 0; q = '';
  document.getElementById('searchInput').value = '';
  renderNav(); renderHeader(); renderTabs(); renderCards();
}

// ─── HEADER ──────────────────────────────────
function renderHeader() {
  const cat = CATS.find(c => c.id === activeCat);
  document.getElementById('catBar').style.background = cat.color;
  document.getElementById('catTitle').textContent = cat.name;
  document.getElementById('catSub').textContent = cat.sub;
  const cnt = selected.filter(s => s.catId === activeCat).length;
  document.getElementById('catInfo').innerHTML = `已選 <strong>${cnt}</strong>`;
}

// ─── GROUP TABS ──────────────────────────────
function renderTabs() {
  const cat = CATS.find(c => c.id === activeCat);
  const tabs = document.getElementById('gtabs');
  tabs.innerHTML = '';
  const allTab = document.createElement('div');
  allTab.className = 'gtab' + (activeGrp === -1 ? ' active' : '');
  allTab.textContent = '全部';
  allTab.onclick = () => { activeGrp = -1; renderTabs(); renderCards(); };
  tabs.appendChild(allTab);
  cat.groups.forEach((g, i) => {
    const t = document.createElement('div');
    t.className = 'gtab' + (activeGrp === i ? ' active' : '');
    t.textContent = g.l;
    t.onclick = () => { activeGrp = i; renderTabs(); renderCards(); };
    tabs.appendChild(t);
  });
}

// ─── CARDS ───────────────────────────────────
function getVisibleTags() {
  const cat = CATS.find(c => c.id === activeCat);
  let tags = [];
  if (activeGrp === -1) cat.groups.forEach(g => g.t.forEach(t => tags.push(t)));
  else { const g = cat.groups[activeGrp]; if(g) g.t.forEach(t => tags.push(t)); }
  if (q) { const ql = q.toLowerCase(); tags = tags.filter(t => t.e.toLowerCase().includes(ql) || t.z.includes(q)); }
  return tags;
}

function renderCards() {
  const cat = CATS.find(c => c.id === activeCat);
  const grid = document.getElementById('grid');
  const tags = getVisibleTags();
  grid.innerHTML = '';
  if (!tags.length) {
    grid.innerHTML = '<div class="empty-res"><div class="ei">🔍</div><p>找不到符合詞彙</p></div>';
    return;
  }
  tags.forEach(tag => {
    const isSel = selected.some(s => s.e === tag.e);
    const card = document.createElement('div');
    card.className = 'card' + (isSel ? ' sel' : '');
    card.style.setProperty('--c-active', cat.color);
    card.dataset.e = tag.e;
    card.innerHTML = `
      <div class="card-img">
        <img src="${imgUrl(tag.e)}" alt="${tag.e}" loading="lazy"
          onload="this.classList.add('ok')"
          onerror="this.parentElement.innerHTML='<div class=\\'card-ph\\'>${cat.icon}</div>'">
      </div>
      <div class="card-body">
        <div class="card-en">${tag.e}</div>
        <div class="card-zh">${tag.z}</div>
      </div>`;
    card.onclick = () => toggleTag(tag, cat);
    grid.appendChild(card);
  });
}

// ─── TOGGLE ──────────────────────────────────
function toggleTag(tag, cat) {
  const idx = selected.findIndex(s => s.e === tag.e);
  if (idx >= 0) { selected.splice(idx, 1); toast(`移除：${tag.e}`); }
  else { selected.push({e:tag.e,z:tag.z,catId:cat.id,color:cat.color}); toast(`加入：${tag.e}`); }
  const card = document.querySelector(`.card[data-e="${CSS.escape(tag.e)}"]`);
  if (card) card.classList.toggle('sel', selected.some(s=>s.e===tag.e));
  renderHeader(); renderNav(); updatePromptBtn();
  if (document.getElementById('sheet').classList.contains('open')) renderSheet();
}

function updatePromptBtn() {
  const el = document.getElementById('navCnt');
  if (selected.length > 0) { el.textContent = selected.length; el.classList.add('show'); }
  else el.classList.remove('show');
}

// ─── SHEET ───────────────────────────────────
function openSheet() {
  document.getElementById('sheet').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  renderSheet();
}
function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function renderSheet() {
  const body = document.getElementById('shBody');
  const empty = document.getElementById('shEmpty');
  document.getElementById('shSub').textContent = selected.length > 0 ? `已選 ${selected.length} 個詞彙` : '尚未選擇任何詞彙';
  body.querySelectorAll('.sel-item').forEach(el => el.remove());
  empty.style.display = selected.length === 0 ? 'block' : 'none';
  document.getElementById('ptBox').textContent = selected.map(s=>s.e).join(', ');
  selected.forEach(s => {
    const item = document.createElement('div');
    item.className = 'sel-item';
    item.dataset.e = s.e;
    item.innerHTML = `
      <div class="sel-dot" style="background:${s.color}"></div>
      <div class="sel-en">${s.e}</div>
      <div class="sel-zh">${s.z}</div>
      <button class="sel-rm" onclick="removeTag('${s.e.replace(/'/g,"\\'")}')">✕</button>`;
    body.appendChild(item);
  });
  renderFavs();
}

function removeTag(e) {
  selected = selected.filter(s => s.e !== e);
  const card = document.querySelector(`.card[data-e="${CSS.escape(e)}"]`);
  if (card) card.classList.remove('sel');
  renderHeader(); renderNav(); updatePromptBtn(); renderSheet();
}

function clearAll() {
  selected = [];
  document.querySelectorAll('.card.sel').forEach(c => c.classList.remove('sel'));
  renderHeader(); renderNav(); updatePromptBtn(); renderSheet();
  toast('已清除全部詞彙');
}

function copyPrompt() {
  if (!selected.length) { toast('⚠️ 請先選擇詞彙'); return; }
  navigator.clipboard.writeText(selected.map(s=>s.e).join(', ')).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied'); btn.textContent = '✓ 已複製！';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📋 複製 Prompt'; }, 2000);
    toast('✓ 已複製到剪貼簿');
  });
}

// ─── FAVS ────────────────────────────────────
function saveFav() {
  if (!selected.length) { toast('⚠️ 請先選擇詞彙'); return; }
  const p = selected.map(s=>s.e).join(', ');
  favs.unshift({ name: p.length>30 ? p.slice(0,30)+'…' : p, prompt: p, tags: selected.map(s=>({...s})) });
  if (favs.length > 10) favs = favs.slice(0,10);
  localStorage.setItem('aipb3_favs', JSON.stringify(favs));
  renderFavs(); toast('⭐ 已儲存收藏');
}
function loadFav(fav) {
  clearAll(); selected = fav.tags.map(t=>({...t}));
  updatePromptBtn(); renderHeader(); renderNav(); renderCards(); renderSheet();
  toast('✓ 已載入收藏組合');
}
function deleteFav(i, ev) {
  ev.stopPropagation(); favs.splice(i,1);
  localStorage.setItem('aipb3_favs', JSON.stringify(favs));
  renderFavs();
}
function renderFavs() {
  const list = document.getElementById('favList');
  list.innerHTML = '';
  if (!favs.length) { list.innerHTML = '<div class="fav-em">尚無收藏組合</div>'; return; }
  favs.forEach((fav, i) => {
    const row = document.createElement('div');
    row.className = 'fav-row'; row.title = fav.prompt;
    row.innerHTML = `<div class="fav-rn">${fav.name}</div><button class="fav-rd" onclick="deleteFav(${i},event)">✕</button>`;
    row.onclick = ev => { if(ev.target.classList.contains('fav-rd')) return; loadFav(fav); };
    list.appendChild(row);
  });
}

// ─── RANDOM ──────────────────────────────────
function addRandom() {
  const cat = CATS.find(c => c.id === activeCat);
  const all = []; cat.groups.forEach(g => g.t.forEach(t => all.push(t)));
  const shuffled = all.sort(()=>Math.random()-0.5).slice(0,4);
  shuffled.forEach(tag => {
    if (!selected.find(s=>s.e===tag.e))
      selected.push({e:tag.e,z:tag.z,catId:cat.id,color:cat.color});
  });
  renderCards(); renderHeader(); renderNav(); updatePromptBtn();
  toast(`🎲 隨機加入詞彙`);
}

// ─── SEARCH ──────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  q = this.value; activeGrp = q ? -1 : 0;
  renderTabs(); renderCards();
});

// ─── TOAST ───────────────────────────────────
let tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => el.classList.remove('show'), 2000);
}

// ─── INIT ────────────────────────────────────
renderNav(); renderHeader(); renderTabs(); renderCards(); renderFavs();
</script>
</body>
</html>
